services:
  # ── PostgreSQL 15 ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: user_api_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apiuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apipassword}
      POSTGRES_DB: ${POSTGRES_DB:-userdb}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apiuser} -d ${POSTGRES_DB:-userdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js API ───────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: user_api_migrate
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-apiuser}:${POSTGRES_PASSWORD:-apipassword}@postgres:5432/${POSTGRES_DB:-userdb}?schema=public
    command: ["npx", "prisma", "db", "push"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: user_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-apiuser}:${POSTGRES_PASSWORD:-apipassword}@postgres:5432/${POSTGRES_DB:-userdb}?schema=public
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
